<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martonloth Games</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("hatter.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            animation: bgPulse 12s infinite ease-in-out;
            will-change: filter;
        }

        h1 {
            position: relative;
            z-index: 1;
        }

        @keyframes bgPulse {
            0% { filter: brightness(80%); }
            50% { filter: brightness(30%); }
            100% { filter: brightness(80%); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <h1>There are no games yet.</h1>
</body>
</html>
